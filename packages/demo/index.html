<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chat-composer demo</title>
    <style>
      body {
        font-family: system-ui;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .cc-input {
        min-height: 60px;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
      }
      .cc-input:focus {
        border-color: #4a90d9;
      }
      /* Inline thumbnails */
      .cc-node-image {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        margin: 0 4px;
        vertical-align: middle;
      }
      .cc-node-image img {
        max-height: 60px;
        max-width: 80px;
        border-radius: 4px;
        cursor: pointer;
        transition: transform 0.15s;
      }
      .cc-node-image img:hover {
        transform: scale(1.05);
      }
      .cc-node-image-label {
        font-size: 0.75em;
        color: #888;
      }
      .cc-node-file {
        background: #f0f0f0;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 0.85em;
        vertical-align: middle;
      }
      .cc-node-mention {
        background: #e3f2fd;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 0.9em;
        vertical-align: middle;
      }
      /* Mention dropdown */
      .mention-dropdown {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 4px;
        margin-top: 4px;
        max-height: 160px;
        overflow-y: auto;
      }
      .mention-item {
        padding: 6px 12px;
        cursor: pointer;
        border-radius: 4px;
      }
      .mention-item:hover {
        background: #e3f2fd;
      }
      .mention-item-label {
        font-weight: 500;
      }
      .mention-item-desc {
        font-size: 0.8em;
        color: #888;
        margin-left: 8px;
      }
      .cc-node-code-block {
        background: #f5f5f5;
        border-radius: 4px;
        padding: 4px 8px;
        font-family: monospace;
        font-size: 0.85em;
        white-space: pre;
        vertical-align: middle;
      }
      /* Lightbox overlay */
      .cc-lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        cursor: pointer;
      }
      .cc-lightbox img {
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 8px;
      }
      .output {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
        margin-top: 16px;
        white-space: pre-wrap;
        font-size: 0.9em;
      }
      .actions {
        margin-top: 8px;
        display: flex;
        gap: 8px;
      }
      button {
        padding: 6px 16px;
        border-radius: 6px;
        border: 1px solid #ddd;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h2>chat-composer demo</h2>
    <div id="input" contenteditable="true" class="cc-input"></div>
    <div id="mention-dropdown" class="mention-dropdown" style="display: none"></div>
    <div class="actions">
      <button id="send-btn" disabled>Send</button>
      <button id="extract-btn">Extract</button>
      <button id="clear-btn">Clear</button>
      <button id="attach-btn">Attach file</button>
      <input type="file" id="file-input" style="display: none" multiple />
    </div>
    <div class="output" id="output">Output will appear here...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
